
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Stickman Domain Fighter PvP</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#05060a;
    font-family:Arial;
}

canvas{
    display:block;
    background:
    radial-gradient(circle at top,#1a1a2e,#05060a 70%);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    font-size:14px;
    line-height:1.5;
    text-shadow:0 0 5px black;
}

#menu{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    z-index:20;
}

.panel{
    background:#111;
    border:2px solid #444;
    padding:20px;
    color:white;
    text-align:center;
    border-radius:10px;
    width:350px;
}

button{
    padding:12px;
    margin:6px;
    width:120px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background:#333;
}
</style>
</head>
<body>

<div id="ui">
<b>ULTIMATE STICKMAN DOMAIN FIGHTER PvP</b><br><br>

A / D = Move<br>
W = Jump<br>
F = Attack<br>
G = Dash<br>
R = Teleport<br>
T = Ultimate<br><br>

Combo attacks increase damage ⚔️<br>
Domain activates under 40 HP 🌀
</div>

<div id="menu">
<div class="panel">
<h1>SELECT STYLE</h1>

<button onclick="start('fire')">🔥 FIRE</button>
<button onclick="start('lightning')">⚡ LIGHTNING</button>
<button onclick="start('clone')">🧍 CLONE</button>
<button onclick="start('chaos')">🌀 CHAOS</button>

<p>Choose style and join a room.</p>
</div>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

// ================= NETWORK =================
const socket = io();

const roomId = prompt("Enter Room Code");

socket.emit("joinRoom", roomId);

let myRole = "player1";
let matchStarted = false;

socket.on("role",(role)=>{
    myRole = role;
});

socket.on("startMatch",()=>{
    matchStarted = true;
});

// ================= CANVAS =================
let blasts = [];

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

window.addEventListener("resize",()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

// ================= INPUT =================
const keys={};

addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;
});

addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
});

// ================= AUDIO =================
const AudioCtx=window.AudioContext||window.webkitAudioContext;
const audio=new AudioCtx();

function sfx(freq,time,type="sine"){

if(audio.state==="suspended") audio.resume();

const osc=audio.createOscillator();
const gain=audio.createGain();

osc.type=type;
osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audio.destination);

osc.start();

gain.gain.setValueAtTime(0.2,audio.currentTime);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+time
);

osc.stop(audio.currentTime+time);
}

// ================= EFFECTS =================
let shake=0;
let flash=0;
let slowmo=1;
let domain=false;

let particles=[];
let cutin=null;

// ================= EFFECT HELPERS =================
function spawnParticles(x,y,color,count=12){

for(let i=0;i<count;i++){

particles.push({
x,y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:30,
color
});

}
}

function screenShake(power){
shake=power;
}

function screenFlash(power){
flash=power;
}

function showCutin(text,color="white"){

cutin={
text,
color,
timer:60
};

slowmo=0.2;
}

// ================= FIGHTER =================
class Fighter{

constructor(x,color,type){

this.x=x;
this.y=canvas.height-120;

this.vx=0;
this.vy=0;

this.width=20;
this.height=60;

this.color=color;
this.type=type;

this.hp=5000;
this.energy=0;

this.combo=0;
this.comboTimer=0;

this.cooldown=0;

this.onGround=true;
this.facing=1;

this.isRemote=false;

this.anim = {
  walk: 0,
  attack: 0
}; 
}

update(enemy){

if(!enemy) return;

if(!this.isRemote){

this.physics();
this.controls(enemy);
this.comboSystem();

if(this.hp<40 && !domain){
activateDomain();
}

}else{

this.physicsRemote();

}

// animation update
if (Math.abs(this.vx) > 0.5 && this.onGround) {
  this.anim.walk += 0.2;
} else {
  this.anim.walk *= 0.9;
}

if (this.anim.attack > 0) {
  this.anim.attack--;
}

}

physics(){

this.vy += 0.7;

this.x += this.vx * slowmo;
this.y += this.vy * slowmo;

if(this.y > canvas.height-120){

this.y = canvas.height-120;
this.vy = 0;
this.onGround = true;

}

this.vx *= 0.85;

if(this.cooldown > 0){
this.cooldown--;
}

if(this.vx > 0) this.facing = 1;
if(this.vx < 0) this.facing = -1;
}

physicsRemote(){

this.vy += 0.7;

this.y += this.vy * slowmo;

if(this.y > canvas.height-120){

this.y = canvas.height-120;
this.vy = 0;
this.onGround = true;

}
}

controls(enemy){

if(keys["a"]){
this.vx = Math.max(this.vx-1,-7);
}

if(keys["d"]){
this.vx = Math.min(this.vx+1,7);
}

if(keys["w"] && this.onGround){

this.vy = -14;
this.onGround = false;

sfx(300,0.05);

}

if(keys["g"]){

this.vx += this.facing*3;

spawnParticles(
this.x,
this.y,
this.color,
5
);

socket.emit("dash",{
roomId,
x:this.x,
y:this.y
});

}

if(keys["r"] && this.cooldown===0){

this.x += this.facing*150;

screenFlash(3);

sfx(700,0.08);

this.cooldown = 20;

socket.emit("teleport",{
roomId,
x:this.x
});

}

if(keys["f"]){
this.attack(enemy);
}

if(
keys["t"] &&
this.energy>=100 &&
this.cooldown===0
){

this.ultimate(enemy);

}

}

comboSystem(){

if(this.comboTimer>0){
this.comboTimer--;
}else{
this.combo=0;
}

}

attack(enemy){

if(this.cooldown>0) return;

const dist = Math.abs(this.x-enemy.x);

if(dist < 80){

let damage = 10+(this.combo*2);

// elemental reaction
if(this.type!==enemy.type){

if(
(this.type==="fire" &&
enemy.type==="lightning") ||

(this.type==="lightning" &&
enemy.type==="fire")
){

damage *= 2;
this.anim.attack = 10;
showCutin(
"ELEMENTAL OVERLOAD ⚡🔥",
"cyan"
);

screenShake(20);

}
}

// chaos style bonus
if(this.type==="chaos"){
damage += Math.random()*10;
}

// clone style rapid hit
if(this.type==="clone"){

spawnParticles(
enemy.x,
enemy.y-20,
"white",
20
);

damage += 5;
}

enemy.hp -= damage;

enemy.vx = this.facing*8;
enemy.vy = -5;

this.energy = Math.min(
100,
this.energy+15
);

this.combo++;
this.comboTimer=60;

screenShake(10);

spawnParticles(
enemy.x,
enemy.y-30,
this.color,
15
);

screenFlash(2);

sfx(180,0.05,"square");

if(this.combo>=3){

showCutin(
"COMBO BREAKER!",
this.color
);

screenShake(25);

}

socket.emit("attack",{
roomId,
damage,
vx:this.facing*8,
vy:-5
});

}

this.cooldown=12;
}

ultimate(enemy){

showCutin(
"ULTIMATE RELEASE 💥",
this.color
);
this.anim.attack = 20;
screenShake(35);
screenFlash(12);

sfx(60,0.25,"square");

blasts.push({
x:this.x,
y:this.y-40,
vx:this.facing*15,
size:40,
life:50,
color:this.color
});

enemy.hp -= 500;

enemy.vx = this.facing*25;
enemy.vy = -15;

this.energy = 0;
this.cooldown = 50;

socket.emit("ultimate",{
roomId,
damage:500,
vx:this.facing*25,
vy:-15,
color:this.color
});

}

draw(){

ctx.strokeStyle=this.color;
ctx.lineWidth=3;

// aura
ctx.beginPath();

ctx.arc(
this.x,
this.y-30,
25+(this.energy/5),
0,
Math.PI*2
);

ctx.strokeStyle =
`rgba(255,255,255,0.1)`;

ctx.stroke();

// head
ctx.beginPath();

ctx.strokeStyle=this.color;

ctx.arc(
this.x,
this.y-40,
10,
0,
Math.PI*2
);

ctx.stroke();

// body
ctx.beginPath();

ctx.moveTo(this.x,this.y-30);
ctx.lineTo(this.x,this.y);

ctx.stroke();

let walk = Math.sin(this.anim.walk);
let attack = this.anim.attack > 0 ? 1 : 0;

// body anchor points
let sx = this.x;
let sy = this.y - 20;

// ARMS (attack pushes forward)
let leftArm  = (-0.8 + walk * 0.6) + (attack * -1.8);
let rightArm = (0.8 - walk * 0.6) + (attack * -2.2);

// LEGS (walking only)
let leftLeg  = (1.2 + walk * 0.8);
let rightLeg = (1.2 - walk * 0.8);

// draw arms
drawLimb(ctx, sx, sy, leftArm, 25);
drawLimb(ctx, sx, sy, rightArm, 25);

// draw legs
drawLimb(ctx, this.x, this.y, leftLeg, 30);
drawLimb(ctx, this.x, this.y, rightLeg, 30);
}

}

// ================= DOMAIN =================
function activateDomain(){

domain = true;

showCutin(
"DOMAIN EXPANSION 🌀",
"white"
);

screenFlash(20);

sfx(40,0.5,"sawtooth");

socket.emit("domain",{
roomId
});
}

function drawDomain(){

if(!domain) return;

ctx.fillStyle="rgba(120,0,255,0.08)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

for(let i=0;i<30;i++){

ctx.fillStyle =
"rgba(255,255,255,0.06)";

ctx.fillRect(
Math.random()*canvas.width,
Math.random()*canvas.height,
2,
40
);

}
}

// ================= PARTICLES =================
function updateParticles(){

for(let p of particles){

p.x += p.vx * slowmo;
p.y += p.vy * slowmo;

p.life--;

ctx.fillStyle = p.color;

ctx.fillRect(
p.x,
p.y,
3,
3
);

}

particles =
particles.filter(p=>p.life>0);

}

// ================= BLASTS =================
function updateBlasts(){

for(let b of blasts){

b.x += b.vx;

b.life--;

ctx.beginPath();

ctx.fillStyle = b.color;

ctx.arc(
b.x,
b.y,
b.size,
0,
Math.PI*2
);

ctx.fill();

ctx.beginPath();

ctx.fillStyle =
"rgba(255,255,255,0.3)";

ctx.arc(
b.x,
b.y,
b.size*1.5,
0,
Math.PI*2
);

ctx.fill();

if(
enemy &&
Math.abs(b.x-enemy.x)<80 &&
b.life>0
){

spawnParticles(
enemy.x,
enemy.y-40,
"white",
40
);

screenShake(25);

b.life = 0;

}

}

blasts = blasts.filter(b=>b.life>0);

}

// ================= FX =================
function applyShake(){

if(shake>0){

ctx.translate(
(Math.random()-0.5)*shake,
(Math.random()-0.5)*shake
);

shake*=0.9;

}
}

function drawFlash(){

if(flash>0){

ctx.fillStyle =
"rgba(255,255,255,0.15)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

flash--;

}
}

function drawCutin(){

if(!cutin) return;

ctx.fillStyle =
"rgba(0,0,0,0.7)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle = cutin.color;

ctx.font="bold 42px Arial";

ctx.fillText(
cutin.text,
canvas.width/2-250,
canvas.height/2
);

cutin.timer--;

if(cutin.timer<=0){

cutin=null;
slowmo=1;

}
}

// ================= PLAYERS =================
let player;
let enemy;

// ================= SOCKET EVENTS =================
socket.on("enemyState",(state)=>{

if(!enemy) return;

enemy.x = state.x;
enemy.y = state.y;
enemy.hp = state.hp;
enemy.energy = state.energy;
enemy.combo = state.combo;
enemy.facing = state.facing;
enemy.type = state.type;

});

socket.on("enemyAttack",(data)=>{

if(!player) return;

player.hp -= data.damage;

player.vx = data.vx || 0;
player.vy = data.vy || 0;

spawnParticles(
player.x,
player.y-30,
"red",
20
);

screenShake(10);
screenFlash(2);

});

socket.on("enemyUltimate",(data)=>{

if(!player) return;

player.hp -= data.damage;

player.vx = data.vx;
player.vy = data.vy;

showCutin(
"ENEMY ULTIMATE 💥",
data.color || "red"
);

screenShake(35);
screenFlash(12);

});

socket.on("enemyTeleport",(data)=>{

if(!enemy) return;

enemy.x = data.x;

screenFlash(3);

});

socket.on("enemyDash",(data)=>{

spawnParticles(
data.x,
data.y,
"white",
5
);

});

socket.on("enemyDomain",()=>{

domain = true;

showCutin(
"DOMAIN EXPANSION 🌀",
"violet"
);

});

// ================= GAME =================
function start(type){

document
.getElementById("menu")
.style.display="none";

const spawnX =
myRole==="player1"
? 200
: canvas.width-200;

const color =
myRole==="player1"
? "cyan"
: "red";

player = new Fighter(
spawnX,
color,
type
);

enemy = new Fighter(
myRole==="player1"
? canvas.width-200
: 200,
"white",
"fire"
);

enemy.isRemote = true;

loop();
}

function drawHUD(){

if(!player || !enemy) return;

ctx.fillStyle="white";
ctx.font="16px Arial";

ctx.fillText(
"PLAYER HP: "+
Math.max(0,Math.floor(player.hp)),
20,
30
);

ctx.fillText(
"ENERGY: "+
Math.floor(player.energy),
20,
55
);

ctx.fillText(
"COMBO: "+player.combo,
20,
80
);

ctx.fillText(
"ENEMY HP: "+
Math.max(0,Math.floor(enemy.hp)),
canvas.width-180,
30
);

if(domain){

ctx.fillStyle="violet";

ctx.fillText(
"DOMAIN ACTIVE",
canvas.width/2-70,
40
);

}
}

function gameOver(text){

ctx.fillStyle =
"rgba(0,0,0,0.5)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="white";

ctx.font="50px Arial";

ctx.fillText(
text,
canvas.width/2-250,
canvas.height/2
);

ctx.font="20px Arial";

ctx.fillText(
"Refresh page to restart",
canvas.width/2-110,
canvas.height/2+50
);

}

// ================= LOOP =================
function loop(){

ctx.save();

applyShake();

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawDomain();

if(player && enemy){

player.update(enemy);
enemy.update(player);

player.draw();
enemy.draw();

socket.emit("state",{
roomId,
state:{
x:player.x,
y:player.y,
hp:player.hp,
energy:player.energy,
combo:player.combo,
facing:player.facing,
type:player.type
}
});

}

updateParticles();
updateBlasts();

ctx.restore();

drawFlash();
drawCutin();

if(player && enemy){

drawHUD();

if(player.hp<=0){

gameOver(
"YOU WERE ERASED 💀"
);

return;
}

if(enemy.hp<=0){

gameOver(
"YOU WON THE DOMAIN WAR 🏆"
);

return;
}

}

requestAnimationFrame(loop);
}

</script>
</body>
</html>
